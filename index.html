<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Grammar Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}body{ font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#4facfe,#00f2fe); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }

.container{ width:100%; max-width:900px; }

.card{ background:white; border-radius:25px; padding:30px; box-shadow:0 15px 35px rgba(0,0,0,0.2); }

.title{ text-align:center; color:#333; font-size:38px; margin-bottom:10px; }

.subtitle{ text-align:center; color:#666; margin-bottom:30px; }

.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:10px; flex-wrap:wrap; }

.info-box{ background:#f5f7ff; padding:12px 18px; border-radius:15px; font-weight:600; color:#333; }

.progress-container{ width:100%; background:#e0e0e0; height:12px; border-radius:20px; overflow:hidden; margin-bottom:25px; }

.progress-bar{ height:100%; width:0%; background:linear-gradient(90deg,#43e97b,#38f9d7); transition:0.4s; }

.question-box{ background:#f9fbff; padding:25px; border-radius:20px; margin-bottom:25px; }

.question-number{ color:#4facfe; font-weight:700; margin-bottom:10px; }

.question-text{ font-size:28px; color:#222; margin-bottom:25px; }

.answers{ display:grid; grid-template-columns:1fr 1fr; gap:15px; }

.answer-btn{ border:none; padding:18px; border-radius:15px; background:#edf2ff; font-size:18px; cursor:pointer; transition:0.3s; font-weight:500; }

.answer-btn:hover{ background:#4facfe; color:white; transform:translateY(-3px); }

.correct{ background:#2ecc71 !important; color:white !important; }

.wrong{ background:#e74c3c !important; color:white !important; }

.controls{ display:flex; justify-content:center; margin-top:25px; }

.next-btn, .restart-btn, .start-btn{ border:none; background:linear-gradient(90deg,#4facfe,#00f2fe); color:white; padding:15px 35px; border-radius:50px; font-size:18px; cursor:pointer; transition:0.3s; font-weight:600; }

.next-btn:hover, .restart-btn:hover, .start-btn:hover{ transform:scale(1.05); }

.home-screen{ text-align:center; }

.levels{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:20px; margin-top:30px; }

.level-btn{ border:none; padding:25px; border-radius:20px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; font-size:20px; cursor:pointer; transition:0.3s; font-weight:600; }

.level-btn:hover{ transform:translateY(-5px); }

.result-screen{ text-align:center; }

.result-score{ font-size:80px; margin:20px 0; }

.result-text{ font-size:28px; color:#333; margin-bottom:15px; }

.result-message{ color:#666; font-size:18px; margin-bottom:30px; }

.hidden{ display:none; }

@media(max-width:700px){ .answers{ grid-template-columns:1fr; }

.question-text{ font-size:22px; }

.title{ font-size:30px; } } </style>

</head>
<body><div class="container">  <div class="card home-screen" id="homeScreen">
    <h1 class="title">📚 English Grammar Quiz</h1>
    <p class="subtitle">Fun learning website for students</p><h2>Select a Level</h2>

<div class="levels">
  <button class="level-btn" onclick="startQuiz(1)">Level 1</button>
  <button class="level-btn" onclick="startQuiz(2)">Level 2</button>
  <button class="level-btn" onclick="startQuiz(3)">Level 3</button>
  <button class="level-btn" onclick="startQuiz(4)">Level 4</button>
</div>

  </div>  <div class="card hidden" id="quizScreen"><div class="top-bar">
  <div class="info-box">⭐ Score: <span id="score">0</span></div>
  <div class="info-box">⏰ Time: <span id="timer">30</span>s</div>
  <div class="info-box">📖 Level: <span id="levelDisplay">1</span></div>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="question-box">
  <div class="question-number" id="questionNumber"></div>
  <div class="question-text" id="questionText"></div>

  <div class="answers" id="answersContainer"></div>
</div>

<div class="controls">
  <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">Next Question ➜</button>
</div>

  </div>  <div class="card result-screen hidden" id="resultScreen">
    <h1 class="title">🎉 Quiz Finished!</h1><div class="result-score" id="finalScore">0/10</div>

<div class="result-text" id="resultText"></div>

<div class="result-message" id="resultMessage"></div>

<button class="restart-btn" onclick="goHome()">🏠 Back to Home</button>

  </div></div><script>
const quizData = {
  1:[
    {
      question:"I ___ a student.",
      answers:["am","is","are","be"],
      correct:"am"
    },
    {
      question:"She ___ happy today.",
      answers:["am","are","is","be"],
      correct:"is"
    },
    {
      question:"They ___ football every day.",
      answers:["play","plays","playing","played"],
      correct:"play"
    },
    {
      question:"We ___ to school by bus.",
      answers:["go","goes","went","gone"],
      correct:"go"
    },
    {
      question:"He ___ a book now.",
      answers:["read","reads","is reading","reading"],
      correct:"is reading"
    }
  ],

  2:[
    {
      question:"Yesterday I ___ to the market.",
      answers:["go","went","gone","going"],
      correct:"went"
    },
    {
      question:"She ___ dinner now.",
      answers:["cook","cooks","is cooking","cooked"],
      correct:"is cooking"
    },
    {
      question:"There are ___ apples in the basket.",
      answers:["much","many","any","little"],
      correct:"many"
    },
    {
      question:"I have ___ water.",
      answers:["many","few","much","apple"],
      correct:"much"
    },
    {
      question:"They ___ TV last night.",
      answers:["watch","watched","watching","watches"],
      correct:"watched"
    }
  ],

  3:[
    {
      question:"If it rains, we ___ home.",
      answers:["stay","stays","will stay","stayed"],
      correct:"will stay"
    },
    {
      question:"She has ___ her homework.",
      answers:["finish","finished","finishing","finishes"],
      correct:"finished"
    },
    {
      question:"This book is ___ than that one.",
      answers:["good","better","best","more good"],
      correct:"better"
    },
    {
      question:"I ___ never been to Japan.",
      answers:["have","has","had","having"],
      correct:"have"
    },
    {
      question:"He speaks English very ___.",
      answers:["good","well","best","better"],
      correct:"well"
    }
  ],

  4:[
    {
      question:"By next year, I ___ university.",
      answers:["finish","finished","will finish","will have finished"],
      correct:"will have finished"
    },
    {
      question:"The cake ___ by my mother yesterday.",
      answers:["made","was made","is made","making"],
      correct:"was made"
    },
    {
      question:"She asked me where I ___ from.",
      answers:["am","was","were","is"],
      correct:"was"
    },
    {
      question:"Neither the teacher nor the students ___ ready.",
      answers:["was","is","are","be"],
      correct:"are"
    },
    {
      question:"Had I known, I ___ helped you.",
      answers:["would","would have","will","can"],
      correct:"would have"
    }
  ]
};

let currentLevel = 1;
let currentQuestion = 0;
let score = 0;
let timer = 30;
let timerInterval;

const homeScreen = document.getElementById('homeScreen');
const quizScreen = document.getElementById('quizScreen');
const resultScreen = document.getElementById('resultScreen');

function startQuiz(level){
  currentLevel = level;
  currentQuestion = 0;
  score = 0;

  document.getElementById('score').textContent = score;
  document.getElementById('levelDisplay').textContent = level;

  homeScreen.classList.add('hidden');
  resultScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');

  loadQuestion();
}

function loadQuestion(){
  resetTimer();

  const data = quizData[currentLevel][currentQuestion];

  document.getElementById('questionNumber').textContent =
  `Question ${currentQuestion + 1} of ${quizData[currentLevel].length}`;

  document.getElementById('questionText').textContent = data.question;

  const answersContainer = document.getElementById('answersContainer');
  answersContainer.innerHTML = '';

  data.answers.forEach(answer => {
    const button = document.createElement('button');
    button.classList.add('answer-btn');
    button.textContent = answer;
    button.onclick = () => selectAnswer(button,answer);
    answersContainer.appendChild(button);
  });

  document.getElementById('nextBtn').classList.add('hidden');

  updateProgress();
}

function selectAnswer(button,answer){
  clearInterval(timerInterval);

  const correctAnswer = quizData[currentLevel][currentQuestion].correct;

  const buttons = document.querySelectorAll('.answer-btn');

  buttons.forEach(btn => btn.disabled = true);

  if(answer === correctAnswer){
    button.classList.add('correct');
    score++;
    document.getElementById('score').textContent = score;
  }
  else{
    button.classList.add('wrong');

    buttons.forEach(btn => {
      if(btn.textContent === correctAnswer){
        btn.classList.add('correct');
      }
    });
  }

  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion(){
  currentQuestion++;

  if(currentQuestion < quizData[currentLevel].length){
    loadQuestion();
  }
  else{
    showResult();
  }
}

function showResult(){
  quizScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');

  const total = quizData[currentLevel].length;

  document.getElementById('finalScore').textContent = `${score}/${total}`;

  let message = '';
  let title = '';

  if(score === total){
    title = '🌟 Excellent!';
    message = 'Perfect score! You are amazing!';
  }
  else if(score >= total * 0.7){
    title = '👏 Great Job!';
    message = 'You did very well! Keep learning!';
  }
  else if(score >= total * 0.4){
    title = '🙂 Good Try!';
    message = 'Practice more and improve your grammar skills.';
  }
  else{
    title = '📘 Keep Practicing!';
    message = 'Do not give up. Practice makes perfect!';
  }

  document.getElementById('resultText').textContent = title;
  document.getElementById('resultMessage').textContent = message;
}

function goHome(){
  resultScreen.classList.add('hidden');
  homeScreen.classList.remove('hidden');
}

function updateProgress(){
  const total = quizData[currentLevel].length;
  const progress = ((currentQuestion) / total) * 100;

  document.getElementById('progressBar').style.width = `${progress}%`;
}

function resetTimer(){
  clearInterval(timerInterval);

  timer = 30;
  document.getElementById('timer').textContent = timer;

  timerInterval = setInterval(() => {
    timer--;
    document.getElementById('timer').textContent = timer;

    if(timer <= 0){
      clearInterval(timerInterval);
      autoWrong();
    }
  },1000);
}

function autoWrong(){
  const buttons = document.querySelectorAll('.answer-btn');
  const correctAnswer = quizData[currentLevel][currentQuestion].correct;

  buttons.forEach(btn => {
    btn.disabled = true;

    if(btn.textContent === correctAnswer){
      btn.classList.add('correct');
    }
  });

  document.getElementById('nextBtn').classList.remove('hidden');
}
</script></body>
</html>
